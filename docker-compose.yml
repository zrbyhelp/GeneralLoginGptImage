services:
  gpt-image-playground:
    build:
      context: .
      dockerfile: deploy/Dockerfile.nuxt
    container_name: gpt-image-playground
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:${APP_HOST_PORT:-3003}}
      NUXT_STORAGE_DIR: /app/storage/generated-images
      NUXT_APP_DATA_DIR: /app/storage/app-data
      NUXT_DB_PATH: /app/storage/app-data/app.db
    ports:
      - "${APP_HOST_PORT:-3003}:3000"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
